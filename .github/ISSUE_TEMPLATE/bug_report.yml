name: Bug Report
description: Report a bug or unexpected behavior in CommitBee
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below to help us reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: CommitBee Version
      description: Output of `commitbee --version`
      placeholder: "commitbee 0.3.1"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      options:
        - Ollama
        - OpenAI / OpenAI-compatible
        - Anthropic
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      description: Which model are you using?
      placeholder: "qwen3.5:4b, gpt-4o, claude-sonnet-4-6, etc."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Stage a file: `git add src/example.rs`
        2. Run: `commitbee --dry-run`
        3. See error: ...
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste any error messages or relevant terminal output.
      render: txt

  - type: textarea
    id: show-prompt
    attributes:
      label: Prompt debug output (optional)
      description: If relevant, paste the output of `commitbee --dry-run --show-prompt`.
      render: txt

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output (optional)
      description: Output of `commitbee doctor`.
      render: txt

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.4, Ubuntu 24.04, Windows 11, etc."

  - type: input
    id: rust-version
    attributes:
      label: Rust Version (if built from source)
      placeholder: "rustc 1.94.0"
